services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - agent-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - agent-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [kafka]
    restart: on-failure
    volumes:
      - ./infra/kafka/topics.sh:/topics.sh
    entrypoint: ["/bin/bash", "/topics.sh"]
    networks:
      - agent-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - agent-net

  webhook:
    build: ./services/webhook_listener
    ports:
      - "8082:8000"
    env_file: .env
    restart: on-failure
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - agent-net

  consumer:
    build: ./services/consumer
    env_file: .env
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - agent-net
    environment:
      ORCHESTRATOR_URL: http://host.docker.internal:8000/ticket/sync
    extra_hosts:
      - "host.docker.internal:host-gateway"

  repo-syncer:
    build: ./services/repo_syncer
    env_file: .env
    environment:
      REPO_WORKDIR: /workspaces
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
    volumes:
      - ./.workspace:/workspaces 
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge